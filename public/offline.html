<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Offline · PassLounge</title>
    <style>
      :root { color-scheme: dark; }
      html, body {
        margin: 0;
        padding: 0;
        min-height: 100dvh;
        background: #0a1629;
        color: #fff;
        font-family: 'Outfit', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      }
      .wrap {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
      }
      .badge {
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: rgba(255,255,255,0.45);
        font-weight: 700;
        margin-bottom: 8px;
      }
      h1 {
        font-size: 28px;
        font-weight: 800;
        margin: 0 0 12px;
      }
      p {
        font-size: 15px;
        color: rgba(255,255,255,0.65);
        line-height: 1.55;
        max-width: 360px;
        margin: 0 0 24px;
      }
      .icon {
        width: 88px;
        height: 88px;
        border-radius: 50%;
        background: linear-gradient(135deg, #053571, #0a4d99);
        border: 2px solid rgba(245, 197, 24, 0.4);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 42px;
        font-weight: 900;
        color: #f5c518;
        margin-bottom: 18px;
      }
      button {
        padding: 12px 22px;
        border-radius: 12px;
        background: #f5c518;
        color: #053571;
        border: none;
        font-size: 14px;
        font-weight: 800;
        cursor: pointer;
        font-family: inherit;
      }
      button:active { transform: scale(0.98); }
      .hint {
        margin-top: 12px;
        font-size: 11px;
        color: rgba(255,255,255,0.35);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="icon">P</div>
      <div class="badge">PassLounge</div>
      <h1>You're offline</h1>
      <p>Open PassLounge when you're back online to continue studying.</p>
      <button type="button" onclick="window.location.reload()">Try again</button>
      <div class="hint">Cached sessions remain available once reconnected.</div>
    </div>
  </body>
</html>
